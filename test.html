<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <link rel="shortcut icon" href="https://amir248.github.io/localhost/hh.svg">
    <title>Super sustem comments web workshop named after baron siteverstauzen.</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

  </head>
  <body>
    <main>
      <article>
        <h1>Super commentns web workshop named after baron siteverstauzen</h1>
        <p>a comment system on the JS node with a registration system that will be working soon...</p>
        <strong>go to main page <a href="https://qucu.ru/">qucu.ru</a> </strong>
      </article>
        <!--
         XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX
                                Here commentsBlock!
        XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX
      -->
      <div id="comments" style="width:100%;max-width:100%"></div>
      <script type="text/javascript">
      async function loadAssets() {
      try {
        // CSS
        const cssResponse = await fetch("https://comments.qucu.ru/style", { credentials: "include" });
        if (!cssResponse.ok) throw new Error(`CSS fetch failed: ${cssResponse.status}`);
        const cssText = await cssResponse.text();
        const style = document.createElement("style");
        style.textContent = cssText;
        document.head.append(style);

        // JS
        const jsResponse = await fetch("https://comments.qucu.ru/js/7", { credentials: "include" });
        if (!jsResponse.ok) throw new Error(`JS fetch failed: ${jsResponse.status}`);
        const jsText = await jsResponse.text();
        const js = document.createElement("script");
        js.textContent = jsText;
        document.head.append(js);

        console.log("JS и CSS успешно подгружены!");
      } catch(err) {
        console.error("Ошибка загрузки:", err);
      }
    }

    loadAssets();
      </script>
      <script type="text/javascript" src='menu.js'></script>
    </main>
  </body>
</html>
